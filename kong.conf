#!/bin/bash
#
# Kong 测试脚本统一配置
# 所有 test/*.sh 脚本共享此配置
# 环境变量优先级: 环境变量 > 本文件默认值
#

# =============================================
# 多 Kong 网关轮询配置
# =============================================
# 每组配置格式: "host:port:token"
# 多组之间用空格分隔，worker 按 round-robin 轮询使用
#
# 方式1: 使用 KONG_ENDPOINTS 数组 (推荐)
#   每个元素格式: "host:port:token"
#
# 方式2: 兼容旧配置 (单节点模式)
#   设置 KONG_HOST / KONG_PORT / AUTH_TOKEN 环境变量
# =============================================

if [ -z "${KONG_ENDPOINTS+x}" ]; then
    # 默认多节点配置，按需修改
    KONG_ENDPOINTS=(
        "8.165.50.42:80:eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJvbGUiOiJzZXJ2aWNlX3JvbGUiLCJpYXQiOjE3NzU3MDQxMzcsImV4cCI6MTMyODYzNDQxMzd9.0Z6nDWW6QSLnlONtyrb2z-BIUxX6iEmjxyzNmDZi8XE"
        "8.165.50.218:80:eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJvbGUiOiJzZXJ2aWNlX3JvbGUiLCJpYXQiOjE3NzU4MTU2NzMsImV4cCI6MTMyODY0NTU2NzN9.8RMft1WgwXIx04BI2v_3i53x3G5N5yVGqBN2Hv2w-GA"
    )
fi

# 节点数量
KONG_ENDPOINT_COUNT=${#KONG_ENDPOINTS[@]}

# 解析单个 endpoint: "host:port:token" -> 设置 _EP_HOST / _EP_PORT / _EP_TOKEN
parse_endpoint() {
    local ep="$1"
    _EP_HOST="${ep%%:*}"
    local rest="${ep#*:}"
    _EP_PORT="${rest%%:*}"
    _EP_TOKEN="${rest#*:}"
}

# 根据索引获取 endpoint URL 和 Token (round-robin)
# 用法: get_endpoint <index>
#   设置: EP_URL, EP_TOKEN
get_endpoint() {
    local idx=$(( $1 % KONG_ENDPOINT_COUNT ))
    parse_endpoint "${KONG_ENDPOINTS[$idx]}"
    EP_URL="http://${_EP_HOST}:${_EP_PORT}"
    EP_TOKEN="${_EP_TOKEN}"
}

# 兼容旧脚本: 默认使用第一个节点
parse_endpoint "${KONG_ENDPOINTS[0]}"
KONG_HOST="${_EP_HOST}"
KONG_PORT="${_EP_PORT}"
KONG_URL="http://${KONG_HOST}:${KONG_PORT}"
AUTH_TOKEN="${_EP_TOKEN}"

# 模型名称
MODEL="${MODEL:-qwen3.6-plus}"

# 压测通用参数
MAX_TOKENS="${MAX_TOKENS:-1000}"
TEMPERATURE="${TEMPERATURE:-0.7}"

# 测试数据目录
DATA_DIR="${DATA_DIR:-/tmp/llm_benchmark_data}"

# 结果输出目录
RESULT_DIR="${RESULT_DIR:-/tmp/llm_benchmark_results}"

# 多 Key 轮转配置 (可选)
RDS_PG_API_KEY_LIST="${RDS_PG_API_KEY_LIST:-sk-31ede6823ff64a0fb44044c69b8c6d1e}"
RDS_PG_API_KEY_STRATEGY="${RDS_PG_API_KEY_STRATEGY:-round-robin}"
